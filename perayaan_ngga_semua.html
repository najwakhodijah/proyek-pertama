<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Skor Kamu</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Fredoka+One&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;min-height:100vh;overflow-x:hidden;font-family:'Nunito',sans-serif;}
body{background:#f0ecda;min-height:100vh;position:relative;overflow-x:hidden;}

/* ═══ FIXED BG ═══ */
.bg-scene{position:fixed;inset:0;z-index:0;pointer-events:none;}
.bg-sky{position:absolute;inset:0;background:linear-gradient(180deg,#eee9d0 0%,#f2edda 60%,#e8e2c8 100%);}

.sun{position:absolute;top:28px;left:48px;width:108px;height:108px;animation:sunPulse 3s ease-in-out infinite;}
@keyframes sunPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.07)}}

.rainbow-wrap{position:absolute;top:14px;right:56px;width:170px;animation:floatY 4s ease-in-out infinite;}
@keyframes floatY{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}

.balloon-left{position:absolute;left:10px;top:36%;animation:floatY 5s ease-in-out infinite;}
.balloon-right{position:absolute;right:8px;top:34%;animation:floatY 5s ease-in-out infinite;animation-delay:-2.2s;}

.grass-wrap{position:absolute;bottom:0;left:0;right:0;height:23%;}

/* ═══ PAGE CONTENT ═══ */
.page-content{
  position:relative;z-index:10;min-height:100vh;
  display:flex;flex-direction:column;align-items:center;
  padding:0 30px 180px;
}

/* ═══ HEADER ═══ */
.header{
  display:flex;align-items:center;justify-content:center;
  gap:0;margin-top:38px;margin-bottom:44px;
  position:relative;width:100%;
}
.ticks{display:flex;flex-direction:column;gap:4px;margin:0 10px;}
.ticks.flip{transform:scaleX(-1);}
.tick{display:block;height:5px;background:#f0c030;border-radius:3px;transform-origin:left center;}
.tick:nth-child(1){width:18px;transform:rotate(-32deg);}
.tick:nth-child(2){width:26px;transform:rotate(-10deg);}
.tick:nth-child(3){width:18px;transform:rotate(16deg);}
.header-title{
  font-family:'Fredoka One',cursive;
  font-size:clamp(2.6rem,6vw,4.2rem);
  color:#1a1a1a;letter-spacing:.5px;
  display:flex;align-items:center;gap:12px;
}

/* ═══ GRID ═══ */
.player-grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:30px 40px;
  max-width:920px;width:100%;
}
@media(max-width:780px){.player-grid{grid-template-columns:repeat(2,1fr);gap:22px 24px;}}
@media(max-width:440px){.player-grid{grid-template-columns:repeat(2,1fr);gap:16px;}}

/* ═══ PLAYER CARD ═══ */
.player-card{
  display:flex;flex-direction:column;align-items:center;gap:0;
  animation:cardIn .55s ease-out both;
}
@keyframes cardIn{from{opacity:0;transform:translateY(30px) scale(.92)}to{opacity:1;transform:translateY(0) scale(1)}}

/* photo box */
.photo-box{
  position:relative;
  width:148px;height:148px;
  background:#d2d2d2;
  border-radius:28px;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 2px 10px rgba(0,0,0,.1);
  overflow:visible;
}
.photo-img{width:100%;height:100%;border-radius:28px;object-fit:cover;display:block;}
.photo-placeholder{
  width:100%;height:100%;border-radius:28px;
  background:#c8c8c8;
  display:flex;align-items:center;justify-content:center;
}
.photo-placeholder svg{width:60px;height:60px;}

/* ── STAR BADGE (PNG asli) ── */
.star-badge{
  position:absolute;
  bottom:-22px;right:-20px;
  z-index:5;
  width:72px;height:72px;
  animation:starWiggle 2.6s ease-in-out infinite;
}
@keyframes starWiggle{
  0%,100%{transform:rotate(-4deg) scale(1)}
  40%{transform:rotate(6deg) scale(1.08)}
  70%{transform:rotate(-3deg) scale(.97)}
}
.star-badge-inner{
  position:relative;
  width:72px;height:72px;
}
.star-badge-inner img{
  width:72px;height:72px;
  object-fit:contain;
  display:block;
  /* drop-shadow saja, no background box */
  filter:drop-shadow(1px 3px 5px rgba(0,0,0,.22));
}
.star-badge-inner .star-num{
  position:absolute;
  /* posisi angka di tengah bintang — disesuaikan */
  top:52%;left:50%;
  transform:translate(-50%,-50%);
  font-family:'Fredoka One',cursive;
  font-size:1.35rem;
  color:#7a4000;
  line-height:1;
  pointer-events:none;
  text-shadow:0 1px 0 rgba(255,255,255,.4);
}

/* name */
.player-name{
  font-family:'Nunito',sans-serif;
  font-size:1.08rem;font-weight:800;
  margin-top:28px;text-align:center;
}
.c0{color:#27ae60;}.c1{color:#2980b9;}.c2{color:#8e44ad;}.c3{color:#c0392b;}
.c4{color:#d35400;}.c5{color:#16a085;}.c6{color:#c0392b;}.c7{color:#2471a3;}

/* mini stars */
.stars-row{display:flex;gap:4px;margin-top:5px;}
.mstar{font-size:.88rem;}
.mstar.empty{filter:grayscale(1);opacity:.3;}
</style>
</head>

const MAX_STARS = 5;
const nameColors = ['c0','c1','c2','c3','c4','c5','c6','c7'];

// ══ DATA PEMAIN — diisi guru ══
const players = [
  { name: 'Celine',  stars: 1, photo: null },
  { name: 'Alesya',  stars: 1, photo: null },
  { name: 'Zidni',   stars: 1, photo: null },
  { name: 'Zya',     stars: 1, photo: null },
  { name: 'Sofwa',   stars: 1, photo: null },
  { name: 'Malik',   stars: 1, photo: null },
  { name: 'Faqih',   stars: 1, photo: null },
  { name: '',        stars: 0, photo: null },
];

function render() {
  const grid = document.getElementById('playerGrid');
  grid.innerHTML = '';

  players.forEach((p, i) => {
    if (!p.name) return;

    const card = document.createElement('div');
    card.className = 'player-card';
    card.style.animationDelay = (i * 0.09).toFixed(2) + 's';

    // mini stars row
    let starsHtml = '';
    for (let s = 0; s < MAX_STARS; s++) {
      starsHtml += `<span class="mstar${s < p.stars ? '' : ' empty'}">⭐</span>`;
    }

    const photoHtml = p.photo
      ? `<img class="photo-img" src="${p.photo}" alt="${p.name}"/>`
      : `<div class="photo-placeholder">
           <svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
             <rect x="4" y="10" width="56" height="44" rx="5" fill="#1a1a1a"/>
             <circle cx="32" cy="27" r="9" fill="#555"/>
             <path d="M10,54 Q32,36 54,54" fill="#555"/>
           </svg>
         </div>`;

    card.innerHTML = `
      <div class="photo-box">
        ${photoHtml}
        <div class="star-badge">
          <div class="star-badge-inner">
            <img src="${STAR_IMG}" alt="bintang"/>
            <span class="star-num">${p.stars}</span>
          </div>
        </div>
      </div>
      <div class="player-name ${nameColors[i % nameColors.length]}">${p.name}</div>
      <div class="stars-row">${starsHtml}</div>
    `;
    grid.appendChild(card);
  });
}

render();
</script>
