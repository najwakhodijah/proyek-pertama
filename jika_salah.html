<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feedback Salah - Kuis Zalfa</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Quicksand:wght@700&display=swap');

        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #e0e0e0;
            font-family: 'Quicksand', sans-serif;
        }

        .canvas {
            width: 800px; 
            height: 600px;
            position: relative;
            background-color: #fff;
            overflow: hidden;
            border-radius: 12px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }

        /* Layer 1: Frame Bintang */
        .bg-frame {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            object-fit: fill;
        }

        /* Layer 2: Shape Biru (DINAIKKAN) */
        .blue-shape {
            position: absolute;
            top: 45%; /* Diubah dari 60% ke 50% supaya lebih naik */
            left: 50%;
            transform: translate(-50%, -35%);
            width: 95%;
            z-index: 2;
        }

        /* Layer 3: Karakter Awan (DINAIKKAN) */
        .cloud-character {
            position: absolute;
            top: 2%; /* Diubah dari 12% ke 8% agar lebih naik */
            left: 50%;
            transform: translateX(-50%);
            width: 600px;
            z-index: 3;
        }

        /* Layer 4: Teks (DINAIKKAN) */
        .text-container {
            position: absolute;
            bottom: 18%; /* Diubah dari 15% ke 18% supaya teks ikut naik */
            width: 100%;
            text-align: center;
            z-index: 4;
            color: white;
            text-shadow: 2px 4px 8px rgba(0,0,0,0.2);
            line-height: 1.1;
        }

        h1 {
            font-size: 50px;
            margin: 0;
            font-weight: 700;
        }

        p {
            font-size: 60px;
            margin: 0;
            font-weight: 700;
            letter-spacing: -1px;
        }
    </style>
</head>
<body>

    <div class="canvas">
        <img src="assets/image/7.png" alt="Frame" class="bg-frame">
        <img src="assets/image/9.png" alt="Shape" class="blue-shape">
        <img src="assets/image/8.png" alt="Cloud" class="cloud-character">

        <div class="text-container">
            <h1>Tidak apa!</h1>
            <p>Mari mencoba lagi</p>
        </div>
    </div>

</body>
</html>
