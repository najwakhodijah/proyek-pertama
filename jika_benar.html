<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yey! Kamu Berhasil</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@600&display=swap" rel="stylesheet">
    <style>
        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            display: flex; justify-content: center; align-items: center;
            background-color: #f9b224; /* Latar dasar orange */
            overflow: hidden;
            font-family: 'Fredoka', sans-serif;
        }

        /* Bingkai Utama menggunakan sparkle.png */
        .main-container {
            width: 100vw;
            height: 100vh;
            background-image: url('assets/image/sparkle.png');
            background-size: 100% 100%;
            background-position: center;
            background-repeat: no-repeat;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        /* Area Konten di dalam Bingkai */
        .content-area {
            position: relative;
            width: 85%;
            height: 80%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Aset 4.png (Blob Burgundy) */
        .blob-bg {
            position: absolute;
            width: 90%;
            height: auto;
            z-index: 1;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        /* Teks digeser lebih ke tengah */
        .text-container {
            position: relative;
            z-index: 2;
            color: white;
            text-align: left;
            margin-right: 15%; /* Memberi ruang untuk bintang di kanan */
            margin-top: 5%;
            text-shadow: 3px 5px 15px rgba(0,0,0,0.3);
        }

        .text-container h1 { 
            font-size: clamp(80px, 10vw, 150px); 
            margin: 0; 
            line-height: 0.8;
        }
        .text-container p { 
            font-size: clamp(40px, 6vw, 90px); 
            margin: 0; 
            font-weight: 400;
        }

        /* Aset 3.png (Bintang) - Dibuat Lebih Besar */
        .star-character {
            position: absolute;
            width: 55%; /* Ukuran diperbesar */
            top: -10%;
            right: -8%;
            z-index: 3;
            filter: drop-shadow(5px 10px 15px rgba(0,0,0,0.2));
        }
    </style>
</head>
<body>

    <div class="main-container">
        <div class="content-area">
            
            <img src="assets/image/4.png" class="blob-bg" alt="Background">
            
            <div class="text-container">
                <h1>Yey!</h1>
                <p>Kamu berhasil</p>
            </div>

            <img src="assets/image/3.png" class="star-character" alt="Star">

        </div>
    </div>

</body>
</html>
